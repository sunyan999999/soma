site_name: SOMA — Somatic Wisdom Architecture
site_description: >-
  SOMA is a cognitive memory framework for AI agents. 7 thinking laws decompose problems,
  bidirectional activation retrieves memories, and weights self-evolve over time.
  pip install soma-wisdom. 智慧超越记忆。
site_url: https://sunyan999999.github.io/soma/
repo_url: https://github.com/sunyan999999/soma
edit_uri: edit/main/docs/
site_author: SOMA Project Team

theme:
  name: material
  language: zh
  features:
    - navigation.sections
    - navigation.expand
    - search.highlight
    - content.code.copy
  palette:
    - scheme: default
      primary: indigo
      accent: amber
      toggle:
        icon: material/weather-night
        name: Dark mode
    - scheme: slate
      primary: indigo
      accent: amber
      toggle:
        icon: material/weather-sunny
        name: Light mode

nav:
  - 首页: index.md
  - 快速开始: quickstart.md
  - 核心理念: philosophy.md
  - 架构手册: architecture.md
  - API 参考: api/index.md
  - 自定义指南: guides/customization.md
  - 对比分析:
    - SOMA vs Mem0: articles/soma-vs-mem0.md
    - SOMA vs Letta: articles/soma-vs-letta.md
    - Why We Built SOMA: articles/why-we-built-soma.md
  - 贡献指南: contributing.md
  - 变更日志: changelog.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/sunyan999999/soma
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/soma-wisdom/

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [.]
          options:
            show_source: true
            show_root_heading: true
            heading_level: 2

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - admonition
  - footnotes
  - toc:
      permalink: true
