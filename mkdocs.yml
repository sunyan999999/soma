site_name: SOMA
site_description: SOMA — Somatic Wisdom Architecture Documentation
repo_url: https://github.com/soma-project/soma-core
edit_uri: edit/main/docs/

theme:
  name: material
  language: en
  features:
    - navigation.sections
    - navigation.expand
    - search.highlight
  palette:
    - scheme: default
      primary: indigo
      accent: amber
      toggle:
        icon: material/weather-night
        name: Dark mode
    - scheme: slate
      primary: indigo
      accent: amber
      toggle:
        icon: material/weather-sunny
        name: Light mode

nav:
  - Home: index.md
  - Quick Start: quickstart.md
  - Philosophy: philosophy.md
  - Architecture: architecture.md
  - API Reference: api/index.md
  - Customization: guides/customization.md
  - Contributing: ../CONTRIBUTING.md
  - Changelog: ../CHANGELOG.md

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [../soma]
          options:
            show_source: true
            show_root_heading: true
            heading_level: 2

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - admonition
  - footnotes
  - toc:
      permalink: true
