site_name: SOMA
site_description: SOMA — 智慧超越记忆，为AI Agent构建的框架优先式认知架构
repo_url: https://github.com/sunyan999999/soma
edit_uri: edit/main/docs/

theme:
  name: material
  language: zh
  features:
    - navigation.sections
    - navigation.expand
    - search.highlight
    - content.code.copy
  palette:
    - scheme: default
      primary: indigo
      accent: amber
      toggle:
        icon: material/weather-night
        name: Dark mode
    - scheme: slate
      primary: indigo
      accent: amber
      toggle:
        icon: material/weather-sunny
        name: Light mode

nav:
  - 首页: index.md
  - 快速开始: quickstart.md
  - 核心理念: philosophy.md
  - 架构手册: architecture.md
  - API 参考: api/index.md
  - API 稳定性: api_stability.md
  - 自定义指南: guides/customization.md
  - 贡献指南: contributing.md
  - 变更日志: changelog.md

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [.]
          options:
            show_source: true
            show_root_heading: true
            heading_level: 2

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - admonition
  - footnotes
  - toc:
      permalink: true
