name: SOMA CI

on:
  push:
    branches: [main, develop]
    paths-ignore:
      - '*.md'
      - 'docs/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - '*.md'
      - 'docs/**'

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint with Ruff
        continue-on-error: true
        run: |
          ruff check soma/ tests/ dash/

      - name: Run tests with coverage
        run: |
          pytest -v --cov=soma --cov-report=term --cov-report=xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.12'
        with:
          file: ./coverage.xml
          flags: unittests
          fail_ci_if_error: false

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build package
        run: |
          pip install build
          python -m build

      - name: Verify wheel
        run: |
          pip install twine
          twine check dist/*

  benchmark:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: pip install -e ".[dev]"

      - name: Run benchmarks
        run: |
          python -c "
          from soma.benchmarks import run_full_benchmark
          from soma.agent import SOMA_Agent
          from soma.config import SOMAConfig, load_config
          from pathlib import Path
          config = SOMAConfig(
              framework=load_config(Path('wisdom_laws.yaml')),
              episodic_persist_dir=Path('ci_data'),
              use_vector_search=True,
          )
          agent = SOMA_Agent(config)
          run = run_full_benchmark(agent)
          print(f'Benchmark scores: {run.scores}')
          assert run.scores['overall'] > 50, f'Overall score too low: {run.scores[\"overall\"]}'
          "
