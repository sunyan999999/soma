name: SOMA CI

on:
  push:
    branches: [main, develop]
    paths-ignore:
      - '*.md'
      - 'docs/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - '*.md'
      - 'docs/**'

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq build-essential libgomp1

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy  # faiss-cpu 需要预装 numpy
          pip install -e ".[dev]"

      - name: Debug installed packages
        run: |
          pip list 2>/dev/null | grep -iE "litellm|fastembed|faiss|chroma|pytest"

      - name: Check import
        run: |
          python -c "import soma; print('soma import OK')"

      - name: Run tests
        run: |
          pytest -v --tb=long --timeout=60 -ra

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build package
        run: |
          pip install build
          python -m build

      - name: Verify wheel
        run: |
          pip install twine
          twine check dist/*
